kind = "web"
previewPath = "/"
title = "Crowd Rush"
version = "1.0.0"
id = "artifacts/crowd-rush"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24401

[services.development]
run = "pnpm --filter @workspace/crowd-rush run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crowd-rush", "run", "build" ]
publicDir = "artifacts/crowd-rush/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24401"
BASE_PATH = "/"
